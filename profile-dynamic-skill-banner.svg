<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');
      .st-text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 400; }
      .st-main { font-family: 'Inter', sans-serif; font-weight: 600; }
    </style>
    
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#21262d" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="1" fill="#30363d" />
    </pattern>
    
    <symbol id="node" viewBox="0 0 160 60">
      <rect x="0" y="0" width="160" height="60" rx="30" fill="rgba(13, 17, 23, 0.8)" stroke="#444d56" stroke-width="1"/>
      <circle cx="30" cy="30" r="15" fill="#0d1117" stroke="#58a6ff" stroke-width="2" filter="url(#glow-cyan)"/>
      <circle cx="30" cy="30" r="6" fill="#58a6ff" opacity="0.8">
        <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite" />
      </circle>
    </symbol>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117"/>
  
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="60 60" dur="20s" repeatCount="indefinite" />
  </rect>

  <g stroke="#30363d" stroke-width="1.5" stroke-dasharray="6 6">
    <path d="M220,150 L500,250"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="15s" repeatCount="indefinite"/></path>
    <path d="M220,350 L500,250"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="12s" repeatCount="indefinite"/></path>
    <path d="M380,150 L500,250"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="18s" repeatCount="indefinite"/></path>
    <path d="M380,350 L500,250"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="20s" repeatCount="indefinite"/></path>
    
    <path d="M1000,250 L1280,150"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="14s" repeatCount="indefinite"/></path>
    <path d="M1000,250 L1280,350"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="16s" repeatCount="indefinite"/></path>
    <path d="M1120,150 L1280,150"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="10s" repeatCount="indefinite"/></path>
    <path d="M1120,350 L1280,350"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="19s" repeatCount="indefinite"/></path>
  </g>

  <g filter="url(#glow-cyan)" class="st-main">
    <text x="750" y="250" text-anchor="middle" dominant-baseline="middle" font-size="50" fill="#f0f6fc" letter-spacing="1">
      Building Scalable Web Experiences
      <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite" />
    </text>
  </g>

  <g transform="translate(140, 120)">
    <animateTransform attributeName="transform" type="translate" values="140 120; 140 115; 140 120" dur="6s" repeatCount="indefinite" begin="0s" />
    <use href="#node" width="160" height="60"/>
    <text x="60" y="35" class="st-text" font-size="20" fill="#f0f6fc">HTML</text>
  </g>
  <g transform="translate(140, 320)">
    <animateTransform attributeName="transform" type="translate" values="140 320; 140 325; 140 320" dur="6s" repeatCount="indefinite" begin="1s" />
    <use href="#node" width="160" height="60"/>
    <text x="60" y="35" class="st-text" font-size="20" fill="#f0f6fc">CSS</text>
  </g>
  <g transform="translate(300, 120)">
    <animateTransform attributeName="transform" type="translate" values="300 120; 295 120; 300 120" dur="7s" repeatCount="indefinite" begin="0.5s" />
    <use href="#node" width="160" height="60"/>
    <text x="60" y="35" class="st-text" font-size="18" fill="#f0f6fc">JavaScript</text>
  </g>
  <g transform="translate(300, 320)">
    <animateTransform attributeName="transform" type="translate" values="300 320; 305 320; 300 320" dur="7s" repeatCount="indefinite" begin="1.5s" />
    <use href="#node" width="160" height="60"/>
    <text x="60" y="35" class="st-text" font-size="20" fill="#f0f6fc">React</text>
  </g>

  <g transform="translate(1040, 120)">
    <animateTransform attributeName="transform" type="translate" values="1040 120; 1045 120; 1040 120" dur="8s" repeatCount="indefinite" begin="2s" />
    <use href="#node" width="160" height="60"/>
    <text x="60" y="35" class="st-text" font-size="20" fill="#f0f6fc">Git</text>
  </g>
  <g transform="translate(1040, 320)">
    <animateTransform attributeName="transform" type="translate" values="1040 320; 1035 320; 1040 320" dur="8s" repeatCount="indefinite" begin="3s" />
    <use href="#node" width="160" height="60"/>
    <text x="60" y="35" class="st-text" font-size="19" fill="#f0f6fc">GitHub</text>
  </g>
  <g transform="translate(1200, 120)">
    <animateTransform attributeName="transform" type="translate" values="1200 120; 1200 125; 1200 120" dur="5s" repeatCount="indefinite" begin="2.5s" />
    <use href="#node" width="160" height="60"/>
    <text x="60" y="35" class="st-text" font-size="18" fill="#f0f6fc">REST APIs</text>
  </g>
  <g transform="translate(1200, 320)">
    <animateTransform attributeName="transform" type="translate" values="1200 320; 1200 315; 1200 320" dur="5s" repeatCount="indefinite" begin="3.5s" />
    <use href="#node" width="160" height="60"/>
    <text x="60" y="35" class="st-text" font-size="17" fill="#f0f6fc">Code Quality</text>
  </g>
  
  <rect width="100%" height="10" fill="linear-gradient(90deg, #58a6ff00, #58a6ff88, #58a6ff00)" y="0"/>
  <rect width="100%" height="10" fill="linear-gradient(90deg, #58a6ff00, #58a6ff88, #58a6ff00)" y="490"/>

</svg>
